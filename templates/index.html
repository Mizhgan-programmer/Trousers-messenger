<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trousers Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: white; border-radius: 20px; padding: 40px; width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .auth-box h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .auth-box input, .auth-box button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; font-size: 16px; }
        .auth-box input { border: 2px solid #e0e0e0; }
        .auth-box input:focus { outline: none; border-color: #667eea; }
        .auth-box button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; cursor: pointer; transition: transform 0.2s; }
        .auth-box button:hover { transform: translateY(-2px); }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #666; }
        .auth-tab.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .chat-container { display: none; height: 100vh; background: white; }
        .sidebar { width: 300px; background: #f8f9fa; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .user-info { padding: 20px; background: white; border-bottom: 1px solid #e0e0e0; text-align: center; }
        .avatar-large { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar-large img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-large img.show { display: block; }
        .avatar-large .initials { color: white; font-size: 32px; font-weight: bold; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .avatar-small img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-small img.show { display: block; }
        .avatar-small .initials { color: white; font-size: 16px; font-weight: bold; }
        .btn-secondary { background: #e9ecef; border: none; border-radius: 10px; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .logout-btn { margin-top: 10px; padding: 10px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
        .users-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 10px; margin: 5px 0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .user-item:hover { background: #e9ecef; }
        .user-item.active { background: #667eea; color: white; }
        .user-item .user-info-flex { display: flex; gap: 12px; align-items: center; }
        .online-status { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .online { background: #4cd137; }
        .offline { background: #a4b0be; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; background: white; border-bottom: 1px solid #e0e0e0; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; position: relative; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-bubble { max-width: 60%; padding: 10px 15px; border-radius: 15px; position: relative; }
        .message.sent .message-bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .message.received .message-bubble { background: white; border: 1px solid #e0e0e0; }
        .message-info { font-size: 11px; margin: 5px 10px; color: #666; display: flex; gap: 10px; align-items: center; }
        .delete-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        .delete-btn:hover { background: #ff4757; color: white; }
        .message-input-area { padding: 20px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .message-input-area input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; }
        .message-input-area button { padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; }
        .file-picker { padding: 12px 16px; background: #e9ecef; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .file-input-hidden { display: none; }
        .attachment-img { max-width: 200px; max-height: 150px; border-radius: 10px; margin: 5px 0; cursor: pointer; transition: transform 0.1s; }
        .attachment-img:hover { transform: scale(1.02); }
        .attachment-link { display: inline-block; padding: 5px 10px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-top: 5px; font-size: 12px; text-decoration: none; color: #333; }
        .reactions-bar { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .reaction-btn { background: rgba(0,0,0,0.05); border: none; border-radius: 20px; padding: 4px 10px; cursor: pointer; font-size: 13px; display: inline-flex; gap: 4px; align-items: center; transition: all 0.1s; }
        .reaction-btn:hover { transform: scale(1.05); }
        .reaction-btn.active { background: rgba(102,126,234,0.3); }
        .notification { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 10px; animation: slideIn 0.3s ease; z-index: 1000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 450px; max-width: 90%; }
        .modal-title { font-size: 22px; margin-bottom: 20px; font-weight: 600; }
        .modal-row { margin: 15px 0; }
        .modal-row label { display: block; margin-bottom: 5px; font-weight: 500; }
        .modal-row input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .error-message { color: #ff4757; text-align: center; margin-top: 10px; }
        hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
        .flex { display: flex; }
        .sending { opacity: 0.5; pointer-events: none; }
        .sending-indicator { font-size: 11px; color: #999; margin-left: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .image-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; cursor: pointer; }
        .image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .deleted-message { font-style: italic; color: #999; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>👖 Trousers</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error-message"></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error-message"></div>
            </div>
        </div>
    </div>
    
    <div id="chatContainer" class="chat-container flex">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar-large" id="currentAvatarWrap">
                    <img id="currentAvatarImg" alt="">
                    <span class="initials" id="currentAvatarInitials">?</span>
                </div>
                <h3 id="currentNickname"></h3>
                <p id="currentUsername"></p>
                <button class="btn-secondary" onclick="openSettings()">⚙️ Настройки</button>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="chatHeader">Выберите собеседника</h2>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #666; margin-top: 50px;">👈 Выберите пользователя из списка слева</div>
            </div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <input type="file" id="fileInput" multiple class="file-input-hidden">
                <label class="file-picker" for="fileInput">📎 Файлы</label>
                <button id="sendBtn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-title">⚙️ Настройки</div>
            <div class="modal-row">
                <label>Никнейм</label>
                <input type="text" id="settingsNickname" placeholder="Новый никнейм">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeSettings()">Отмена</button>
                <button class="btn-primary" onclick="saveNickname()">Сохранить</button>
            </div>
            <hr>
            <div class="modal-row">
                <label>Текущий пароль</label>
                <input type="password" id="settingsCurrentPassword" placeholder="Текущий пароль">
            </div>
            <div class="modal-row">
                <label>Новый пароль</label>
                <input type="password" id="settingsNewPassword" placeholder="Новый пароль">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="changePassword()">Изменить пароль</button>
            </div>
            <hr>
            <div class="modal-row">
                <label>Аватарка</label>
                <input type="file" id="avatarInput" accept="image/*" class="file-input-hidden">
                <label class="file-picker" for="avatarInput" style="width:100%;text-align:center;">Выберите файл</label>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="uploadAvatar()">Загрузить аватар</button>
            </div>
        </div>
    </div>

    <div id="imageViewer" class="image-viewer" onclick="closeImageViewer()">
        <img id="viewerImage" src="">
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentChatUser = null;
        const REACTION_EMOJIS = ['👍', '❤️', '😂', '😮', '👎'];
        let sending = false;
        
        function initSocket() {
            socket = io();
            socket.on('connect', () => console.log('WebSocket подключен'));
            socket.on('user_list_update', (users) => updateUsersList(users));
            socket.on('chat_history', (data) => { loadHistory(data.history); if (data.other_user !== currentChatUser) { currentChatUser = data.other_user; document.getElementById('chatHeader').innerHTML = `Чат с ${data.other_user}`; } });
            socket.on('new_message', (message) => addMessageToChat(message));
            socket.on('message_notification', (n) => showNotification(`Новое сообщение от ${n.from_nickname}: ${n.message}`));
            socket.on('reaction_update', (data) => updateReactionUI(data));
            socket.on('message_deleted', (data) => { const msgDiv = document.querySelector(`.message[data-message-id="${data.message_id}"]`); if(msgDiv) msgDiv.remove(); });
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') { document.querySelector('.auth-tab:first-child').classList.add('active'); document.getElementById('loginForm').classList.add('active'); }
            else { document.querySelector('.auth-tab:last-child').classList.add('active'); document.getElementById('registerForm').classList.add('active'); }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value.trim();
            if (!username || !password || !nickname) { document.getElementById('regError').textContent = 'Заполните все поля'; return; }
            const resp = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password, nickname}) });
            const data = await resp.json();
            if (data.success) { alert(data.message); switchTab('login'); }
            else { document.getElementById('regError').textContent = data.message; }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { document.getElementById('loginError').textContent = 'Заполните все поля'; return; }
            const resp = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
            const data = await resp.json();
            if (data.success) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                updateAvatarDisplay(data.username);
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('messageInput').disabled = true;
                initSocket();
                loadUsers();
            } else { document.getElementById('loginError').textContent = data.message; }
        }
        
        async function logout() { await fetch('/api/logout', {method: 'POST'}); if(socket) socket.disconnect(); location.reload(); }
        async function loadUsers() { const resp = await fetch('/api/users'); const users = await resp.json(); updateUsersList(users); }
        
        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = users.filter(u => u.username !== currentUser.username).map(user => `
                <div class="user-item ${currentChatUser === user.username ? 'active' : ''}" onclick="startChat('${user.username}')">
                    <div class="user-info-flex">
                        <div class="avatar-small" id="avatar-${user.username}">
                            <img class="avatar-img" src="/api/avatar/${user.username}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="display:none;">
                            <span class="initials" style="display:block;">${(user.nickname || user.username)[0].toUpperCase()}</span>
                        </div>
                        <div><strong>${escapeHtml(user.nickname)}</strong><br><small>@${user.username}</small></div>
                    </div>
                    <span class="online-status ${user.is_online ? 'online' : 'offline'}"></span>
                </div>
            `).join('');
            users.forEach(user => { if(user.username !== currentUser.username) loadAvatarForUser(user.username); });
        }
        
        async function loadAvatarForUser(username) {
            try { const resp = await fetch(`/api/avatar/${username}`); if(resp.ok) { const blob = await resp.blob(); const url = URL.createObjectURL(blob); const img = document.querySelector(`#avatar-${username} img`); if(img) { img.src = url; img.style.display = 'block'; img.nextElementSibling.style.display = 'none'; } } } catch(e) {}
        }
        
        async function updateAvatarDisplay(username) {
            try { const resp = await fetch(`/api/avatar/${username}`); if(resp.ok) { const blob = await resp.blob(); const url = URL.createObjectURL(blob); const img = document.getElementById('currentAvatarImg'); img.src = url; img.classList.add('show'); document.getElementById('currentAvatarInitials').style.display = 'none'; } } catch(e) {}
        }
        
        function startChat(username) {
            currentChatUser = username;
            document.getElementById('chatHeader').innerHTML = `Чат с ${username}`;
            document.getElementById('messageInput').disabled = false;
            socket.emit('join_chat', {other_user: username});
        }
        
        function loadHistory(history) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            if (history.length === 0) { messagesArea.innerHTML = '<div style="text-align: center; color: #666;">Нет сообщений</div>'; return; }
            history.forEach(msg => addMessageToChat(msg));
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function addMessageToChat(message) {
            const messagesArea = document.getElementById('messagesArea');
            const isSent = message.from === currentUser.username;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.setAttribute('data-message-id', message.id);
            
            const reactionsMap = {}; (message.reactions || []).forEach(r => { reactionsMap[r.emoji] = r.count; });
            const myReaction = message.my_reaction || null;
            
            const attachmentsHtml = (message.attachments || []).map(att => {
                if (att.mime_type && att.mime_type.startsWith('image/')) {
                    return `<img class="attachment-img" src="${att.url}" alt="${escapeHtml(att.file_name)}" onclick="event.stopPropagation(); openImageViewer('${att.url}')">`;
                }
                return `<a class="attachment-link" href="${att.url}" target="_blank">📄 ${escapeHtml(att.file_name)}</a>`;
            }).join('');
            
            const reactionsHtml = REACTION_EMOJIS.map(e => {
                const count = reactionsMap[e] || 0;
                const active = myReaction === e ? 'active' : '';
                return `<button class="reaction-btn ${active}" data-emoji="${e}" onclick="toggleReaction(${message.id}, '${e}')">${e}<span class="count">${count}</span></button>`;
            }).join('');
            
            messageDiv.innerHTML = `
                <div class="message-bubble">${attachmentsHtml ? attachmentsHtml + '<br>' : ''}${escapeHtml(message.message)}</div>
                <div class="message-info">
                    <span>${message.from_nickname} • ${message.timestamp}</span>
                    <button class="delete-btn" onclick="deleteMessage(${message.id})">🗑️ Удалить</button>
                </div>
                <div class="reactions-bar">${reactionsHtml}</div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function openImageViewer(url) { document.getElementById('viewerImage').src = url; document.getElementById('imageViewer').style.display = 'flex'; }
        function closeImageViewer() { document.getElementById('imageViewer').style.display = 'none'; }
        
        async function sendMessage() {
            if (!currentChatUser || sending) return;
            const input = document.getElementById('messageInput');
            const fileInput = document.getElementById('fileInput');
            const message = input.value.trim();
            const files = fileInput.files;
            if (!message && (!files || files.length === 0)) return;
            
            sending = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.innerHTML = '⏳ Отправка...';
            sendBtn.classList.add('sending');
            
            const formData = new FormData();
            formData.append('to', currentChatUser);
            formData.append('message', message);
            for (const file of files) formData.append('files', file);
            
            try {
                const resp = await fetch('/api/send_message', { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.success) { input.value = ''; fileInput.value = ''; }
                else { alert(data.message || 'Ошибка'); }
            } catch(e) { alert('Ошибка отправки'); }
            finally { sending = false; sendBtn.innerHTML = 'Отправить'; sendBtn.classList.remove('sending'); }
        }
        
        async function toggleReaction(messageId, emoji) {
            if (!socket) return;
            const btn = document.querySelector(`.message[data-message-id="${messageId}"] .reaction-btn[data-emoji="${emoji}"]`);
            const isActive = btn && btn.classList.contains('active');
            socket.emit(isActive ? 'remove_reaction' : 'add_reaction', {message_id: messageId, emoji: emoji});
        }
        
        async function deleteMessage(messageId) {
            if (!confirm('Удалить сообщение?')) return;
            await fetch('/api/delete_message', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message_id: messageId}) });
        }
        
        function updateReactionUI(data) {
            const messageDiv = document.querySelector(`.message[data-message-id="${data.message_id}"]`);
            if (!messageDiv) return;
            const reactionsMap = {}; data.reactions.forEach(r => { reactionsMap[r.emoji] = r.count; });
            REACTION_EMOJIS.forEach(e => {
                const btn = messageDiv.querySelector(`.reaction-btn[data-emoji="${e}"]`);
                if (btn) {
                    btn.querySelector('.count').textContent = reactionsMap[e] || 0;
                    if (data.my_reaction === e) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        }
        
        function showNotification(message) { const n = document.createElement('div'); n.className = 'notification'; n.textContent = message; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function openSettings() { document.getElementById('settingsNickname').value = currentUser?.nickname || ''; document.getElementById('settingsCurrentPassword').value = ''; document.getElementById('settingsNewPassword').value = ''; document.getElementById('avatarInput').value = ''; document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        
        async function saveNickname() {
            const nickname = document.getElementById('settingsNickname').value.trim();
            if (!nickname) return alert('Никнейм не может быть пустым');
            const resp = await fetch('/api/update_nickname', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nickname}) });
            const data = await resp.json();
            if (data.success) { currentUser.nickname = nickname; document.getElementById('currentNickname').textContent = nickname; closeSettings(); loadUsers(); }
            else alert(data.message);
        }
        
        async function changePassword() {
            const current = document.getElementById('settingsCurrentPassword').value;
            const newPass = document.getElementById('settingsNewPassword').value;
            if (!current || !newPass) return alert('Заполните все поля');
            const resp = await fetch('/api/update_password', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({current_password: current, new_password: newPass}) });
            const data = await resp.json();
            if (data.success) { alert('Пароль изменён'); closeSettings(); }
            else alert(data.message);
        }
        
        async function uploadAvatar() {
            const file = document.getElementById('avatarInput').files[0];
            if (!file) return alert('Выберите файл');
            const fd = new FormData(); fd.append('avatar', file);
            const resp = await fetch('/api/update_avatar', { method: 'POST', body: fd });
            const data = await resp.json();
            if (data.success) { updateAvatarDisplay(currentUser.username); alert('Аватар обновлён'); closeSettings(); }
            else alert(data.message);
        }
        
        async function checkAuth() {
            const resp = await fetch('/api/check_auth');
            const data = await resp.json();
            if (data.authenticated) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                updateAvatarDisplay(data.username);
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('messageInput').disabled = true;
                initSocket();
                loadUsers();
            }
        }
        checkAuth();
    </script>
</body>
</html>
