    <div id="settingsModal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-title">⚙️ Настройки профиля</div>
            
            <!-- АВАТАРКА — наверх, самое важное -->
            <div class="modal-row">
                <label>🖼️ Аватарка</label>
                <div class="avatar-upload-row">
                    <input type="file" id="avatarInput" accept="image/*" class="file-input-hidden">
                    <label class="file-picker" for="avatarInput" style="display:inline-block; width:auto;">📁 Выбрать фото</label>
                    <button class="btn-small" onclick="uploadAvatar()">💾 Загрузить</button>
                </div>
                <div class="hint">Рекомендуемый размер: квадратное фото</div>
            </div>
            
            <hr>
            
            <!-- НИКНЕЙМ -->
            <div class="modal-row">
                <label>✏️ Отображаемое имя (никнейм)</label>
                <input type="text" id="settingsNickname" placeholder="Новый никнейм">
                <div class="modal-actions" style="margin-top: 10px;">
                    <button class="btn-primary" onclick="saveNickname()">Сохранить никнейм</button>
                </div>
            </div>
            
            <hr>
            
            <!-- ПАРОЛЬ — вынесен отдельно -->
            <div class="modal-row">
                <label>🔐 Смена пароля</label>
                <input type="password" id="settingsCurrentPassword" placeholder="Текущий пароль">
                <input type="password" id="settingsNewPassword" placeholder="Новый пароль" style="margin-top: 10px;">
                <div class="modal-actions" style="margin-top: 10px;">
                    <button class="btn-primary" onclick="changePassword()">Сменить пароль</button>
                </div>
            </div>
            
            <hr>
            
            <!-- ЗАКРЫТИЕ -->
            <div class="modal-actions" style="justify-content: center;">
                <button class="btn-secondary" onclick="closeSettings()">Закрыть</button>
            </div>
        </div>
    </div>
