<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trousers Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Аутентификация */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-box h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-box button:hover {
            transform: translateY(-2px);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        /* Основной чат */
        .chat-container {
            display: none;
            height: 100vh;
            background: white;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 10px;
            padding: 8px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:hover {
            background: #e9ecef;
        }

        .user-item.active {
            background: #667eea;
            color: white;
        }

        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background: #4cd137;
        }

        .offline {
            background: #a4b0be;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h2 {
            color: #333;
            font-size: 20px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.received .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message-info {
            font-size: 12px;
            margin: 5px 10px;
            color: #666;
        }

        .message-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .message-input-area button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .flex {
            display: flex;
        }

        .error-message {
            color: #ff4757;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Форма аутентификации -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>👖 Trousers</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            
            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error-message"></div>
            </div>
            
            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error-message"></div>
            </div>
        </div>
    </div>
    
    <!-- Основной чат -->
    <div id="chatContainer" class="chat-container flex">
        <div class="sidebar">
            <div class="user-info">
                <h3 id="currentNickname"></h3>
                <p id="currentUsername"></p>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="chatHeader">Выберите собеседника</h2>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #666; margin-top: 50px;">
                    👈 Выберите пользователя из списка слева
                </div>
            </div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." 
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentChatUser = null;
        
        // Подключение WebSocket
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('WebSocket подключен');
            });
            
            socket.on('user_list_update', (users) => {
                updateUsersList(users);
            });
            
            socket.on('chat_history', (data) => {
                loadHistory(data.history);
                if (data.other_user !== currentChatUser) {
                    currentChatUser = data.other_user;
                    document.getElementById('chatHeader').innerHTML = `Чат с ${data.other_user}`;
                }
            });
            
            socket.on('new_message', (message) => {
                addMessageToChat(message);
            });
            
            socket.on('message_notification', (notification) => {
                showNotification(`Новое сообщение от ${notification.from_nickname}: ${notification.message}`);
                updateUsersListWithNotification(notification.from);
            });
        }
        
        // Переключение между формами
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        // Регистрация
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value;
            
            if (!username || !password || !nickname) {
                document.getElementById('regError').textContent = 'Заполните все поля';
                return;
            }
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, nickname})
            });
            
            const data = await response.json();
            if (data.success) {
                alert(data.message);
                switchTab('login');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regNickname').value = '';
            } else {
                document.getElementById('regError').textContent = data.message;
            }
        }
        
        // Вход
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = 'Заполните все поля';
                return;
            }
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const data = await response.json();
            if (data.success) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                
                // Показываем чат
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                
                // Инициализируем WebSocket
                initSocket();
                
                // Загружаем список пользователей
                loadUsers();
            } else {
                document.getElementById('loginError').textContent = data.message;
            }
        }
        
        // Выход
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            if (socket) {
                socket.disconnect();
            }
            location.reload();
        }
        
        // Загрузка списка пользователей
        async function loadUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            updateUsersList(users);
        }
        
        // Обновление списка пользователей
        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            const currentUsername = currentUser.username;
            
            usersList.innerHTML = users
                .filter(u => u.username !== currentUsername)
                .map(user => `
                    <div class="user-item ${currentChatUser === user.username ? 'active' : ''}" 
                         onclick="startChat('${user.username}')">
                        <div>
                            <strong>${user.nickname}</strong><br>
                            <small>@${user.username}</small>
                        </div>
                        <span class="online-status ${user.is_online ? 'online' : 'offline'}"></span>
                    </div>
                `).join('');
        }
        
        function updateUsersListWithNotification(username) {
            // Просто обновляем список, но можно добавить анимацию
            loadUsers();
        }
        
        // Начать чат с пользователем
        function startChat(username) {
            currentChatUser = username;
            document.getElementById('chatHeader').innerHTML = `Чат с ${username}`;
            document.getElementById('messageInput').disabled = false;
            
            // Присоединяемся к комнате чата
            socket.emit('join_chat', {other_user: username});
        }
        
        // Загрузка истории сообщений
        function loadHistory(history) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            if (history.length === 0) {
                messagesArea.innerHTML = '<div style="text-align: center; color: #666;">Нет сообщений. Напишите что-нибудь!</div>';
                return;
            }
            
            history.forEach(msg => {
                addMessageToChat(msg);
            });
            
            // Скроллим вниз
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Добавление сообщения в чат
        function addMessageToChat(message) {
            const messagesArea = document.getElementById('messagesArea');
            const isSent = message.from === currentUser.username;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${escapeHtml(message.message)}
                </div>
                <div class="message-info">
                    ${message.from_nickname} • ${message.timestamp}
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Отправка сообщения
        function sendMessage() {
            if (!currentChatUser) {
                alert('Выберите собеседника');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            socket.emit('send_message', {
                to: currentChatUser,
                message: message
            });
            
            input.value = '';
        }
        
        // Показать уведомление
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Проверка авторизации при загрузке
        async function checkAuth() {
            const response = await fetch('/api/check_auth');
            const data = await response.json();
            
            if (data.authenticated) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                initSocket();
                loadUsers();
            }
        }
        
        // Запуск при загрузке
        checkAuth();
    </script>
</body>
</html>
