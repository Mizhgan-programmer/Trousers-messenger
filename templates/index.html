<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trousers Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Аутентификация */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-box h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-box button:hover {
            transform: translateY(-2px);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        /* Основной чат */
        .chat-container {
            display: none;
            height: 100vh;
            background: white;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 10px;
            padding: 8px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            padding: 12px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:hover {
            background: #e9ecef;
        }

        .user-item.active {
            background: #667eea;
            color: white;
        }

        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .online {
            background: #4cd137;
        }

        .offline {
            background: #a4b0be;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h2 {
            color: #333;
            font-size: 20px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.received .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .message-info {
            font-size: 12px;
            margin: 5px 10px;
            color: #666;
        }

        .message-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .message-input-area button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .flex {
            display: flex;
        }

        .error-message {
            color: #ff4757;
            text-align: center;
            margin-top: 10px;
        }

        .reactions-bar {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .reaction-btn {
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.9);
            border-radius: 999px;
            padding: 6px 10px;
            cursor: pointer;
            transition: transform 0.05s ease, background 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .reaction-btn:active { transform: scale(0.98); }

        .reaction-btn.active {
            background: rgba(102,126,234,0.15);
            border-color: rgba(102,126,234,0.6);
        }

        /* Аватары: если изображения нет, показываем круг с градиентом как у кнопок */
        .avatar-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
            flex: 0 0 auto;
        }

        .avatar-wrap.small {
            width: 34px;
            height: 34px;
            margin-bottom: 0;
        }

        .avatar-initials {
            color: #fff;
            font-weight: 800;
            font-size: 18px;
            line-height: 1;
            user-select: none;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-img.show {
            display: block;
        }

        /* Красивый выбор файла */
        .file-picker {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 10px 14px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
        }

        .file-picker:active { transform: scale(0.98); }

        .file-input-hidden { display: none; }

        .attachment-img {
            max-width: 260px;
            max-height: 220px;
            border-radius: 12px;
            display: block;
            margin: 4px 0;
        }

        .attachment-link {
            display: inline-block;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.7);
            color: #333;
            text-decoration: none;
            margin-top: 6px;
        }

        /* Настройки (модалка) */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            width: 520px;
            max-width: 100%;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.25);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .modal-row {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            align-items: center;
        }

        .modal-content input[type="text"],
        .modal-content input[type="password"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 14px;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Форма аутентификации -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>👖 Trousers</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            
            <!-- Форма входа -->
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error-message"></div>
            </div>
            
            <!-- Форма регистрации -->
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error-message"></div>
            </div>
        </div>
    </div>
    
    <!-- Основной чат -->
    <div id="chatContainer" class="chat-container flex">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar-wrap" id="currentAvatarWrap">
                    <img id="currentAvatar" class="avatar-img" alt="avatar" src="">
                    <span class="avatar-initials" id="currentAvatarInitials">?</span>
                </div>
                <h3 id="currentNickname"></h3>
                <p id="currentUsername"></p>
                <button class="btn-secondary" onclick="openSettings()" style="margin-top:10px;width:100%;">Настройки</button>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="chatHeader">Выберите собеседника</h2>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #666; margin-top: 50px;">
                    👈 Выберите пользователя из списка слева
                </div>
            </div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." 
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <input type="file" id="fileInput" multiple class="file-input-hidden">
                <label class="file-picker" for="fileInput" title="Можно отправить файлы вместе с сообщением">
                    Выбрать файл(ы)
                </label>
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div id="settingsModal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-title">Настройки</div>

            <div class="modal-row">
                <div style="width:120px;font-weight:600;">Никнейм</div>
                <input type="text" id="settingsNickname" placeholder="Новый никнейм">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeSettings()">Отмена</button>
                <button class="btn-primary" onclick="saveNickname()">Сохранить</button>
            </div>

            <hr style="margin:16px 0;border:none;border-top:1px solid #eee;">

            <div class="modal-row">
                <div style="width:120px;font-weight:600;">Текущий пароль</div>
                <input type="password" id="settingsCurrentPassword" placeholder="Текущий пароль">
            </div>
            <div class="modal-row">
                <div style="width:120px;font-weight:600;">Новый пароль</div>
                <input type="password" id="settingsNewPassword" placeholder="Новый пароль">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="changePassword()">Изменить пароль</button>
            </div>

            <hr style="margin:16px 0;border:none;border-top:1px solid #eee;">

            <div class="modal-row">
                <div style="width:120px;font-weight:600;">Аватарка</div>
                <input type="file" id="avatarInput" accept="image/*" class="file-input-hidden">
                <label class="file-picker" for="avatarInput" style="width:100%;justify-content:center;">
                    Выберите файл
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="uploadAvatar()">Загрузить аватар</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentChatUser = null;
        const REACTION_EMOJIS = ['👍', '❤️', '😂', '😮', '👎'];
        
        // Подключение WebSocket
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('WebSocket подключен');
            });
            
            socket.on('user_list_update', (users) => {
                updateUsersList(users);
            });
            
            socket.on('chat_history', (data) => {
                loadHistory(data.history);
                if (data.other_user !== currentChatUser) {
                    currentChatUser = data.other_user;
                    document.getElementById('chatHeader').innerHTML = `Чат с ${data.other_user}`;
                }
            });
            
            socket.on('new_message', (message) => {
                addMessageToChat(message);
            });
            
            socket.on('message_notification', (notification) => {
                showNotification(`Новое сообщение от ${notification.from_nickname}: ${notification.message}`);
                updateUsersListWithNotification(notification.from);
            });

            socket.on('reaction_update', (data) => {
                updateReactionUI(data);
            });
        }
        
        // Переключение между формами
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        // Регистрация
        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value;
            
            if (!username || !password || !nickname) {
                document.getElementById('regError').textContent = 'Заполните все поля';
                return;
            }
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, nickname})
            });
            
            const data = await response.json();
            if (data.success) {
                alert(data.message);
                switchTab('login');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regNickname').value = '';
            } else {
                document.getElementById('regError').textContent = data.message;
            }
        }
        
        // Вход
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = 'Заполните все поля';
                return;
            }
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const data = await response.json();
            if (data.success) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                setAvatarForCurrentUser(data.username, data.avatar_url, data.nickname);
                
                // Показываем чат
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('fileInput').disabled = true;
                
                // Инициализируем WebSocket
                initSocket();
                
                // Загружаем список пользователей
                loadUsers();
            } else {
                document.getElementById('loginError').textContent = data.message;
            }
        }
        
        // Выход
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            if (socket) {
                socket.disconnect();
            }
            location.reload();
        }
        
        // Загрузка списка пользователей
        async function loadUsers() {
            const response = await fetch('/api/users');
            const users = await response.json();
            updateUsersList(users);
        }
        
        // Обновление списка пользователей
        function updateUsersList(users) {
            const usersList = document.getElementById('usersList');
            const currentUsername = currentUser.username;
            
            usersList.innerHTML = users
                .filter(u => u.username !== currentUsername)
                .map(user => `
                    <div class="user-item ${currentChatUser === user.username ? 'active' : ''}" 
                         onclick="startChat('${user.username}')">
                        <div style="display:flex;gap:10px;align-items:center;">
                            <div class="avatar-wrap small">
                                <img class="avatar-img ${user.avatar_url ? 'show' : ''}" 
                                     src="${user.avatar_url || ''}"
                                     alt="avatar"
                                     onerror="this.classList.remove('show'); this.src='';">
                                <span class="avatar-initials">${(user.nickname || user.username || '?').trim().charAt(0).toUpperCase()}</span>
                            </div>
                            <div>
                                <strong>${user.nickname}</strong><br>
                                <small>@${user.username}</small>
                            </div>
                        </div>
                        <span class="online-status ${user.is_online ? 'online' : 'offline'}"></span>
                    </div>
                `).join('');
        }
        
        function updateUsersListWithNotification(username) {
            // Просто обновляем список, но можно добавить анимацию
            loadUsers();
        }
        
        // Начать чат с пользователем
        function startChat(username) {
            currentChatUser = username;
            document.getElementById('chatHeader').innerHTML = `Чат с ${username}`;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('fileInput').disabled = false;
            
            // Присоединяемся к комнате чата
            socket.emit('join_chat', {other_user: username});
        }
        
        // Загрузка истории сообщений
        function loadHistory(history) {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            if (history.length === 0) {
                messagesArea.innerHTML = '<div style="text-align: center; color: #666;">Нет сообщений. Напишите что-нибудь!</div>';
                return;
            }
            
            history.forEach(msg => {
                addMessageToChat(msg);
            });
            
            // Скроллим вниз
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Добавление сообщения в чат
        function addMessageToChat(message) {
            const messagesArea = document.getElementById('messagesArea');
            const isSent = message.from === currentUser.username;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.setAttribute('data-message-id', message.id);

            const reactionsMap = {};
            (message.reactions || []).forEach(r => {
                reactionsMap[r.emoji] = r.count;
            });
            const myReaction = message.my_reaction || null;

            const attachmentsHtml = (message.attachments || []).map(att => {
                if (att.mime_type && att.mime_type.startsWith('image/')) {
                    return `<img class="attachment-img" src="${att.url}" alt="${escapeHtml(att.file_name || 'image')}">`;
                }
                return `<a class="attachment-link" href="${att.url}" target="_blank">${escapeHtml(att.file_name || 'file')}</a>`;
            }).join('');

            const textHtml = message.message ? escapeHtml(message.message) : '';

            const reactionsHtml = REACTION_EMOJIS
                .map(e => {
                    const count = reactionsMap[e] || 0;
                    const active = myReaction === e ? 'active' : '';
                    return `
                        <button class="reaction-btn ${active}" data-emoji="${e}" onclick="sendReaction(${message.id}, '${e}')">
                            <span>${e}</span>
                            <span class="count">${count}</span>
                        </button>
                    `;
                })
                .join('');

            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${attachmentsHtml ? attachmentsHtml : ''}
                    ${textHtml ? textHtml : ''}
                </div>
                <div class="message-info">
                    ${message.from_nickname} • ${message.timestamp}
                </div>
                <div class="reactions-bar">
                    ${reactionsHtml}
                </div>
            `;

            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Отправка сообщения
        async function sendMessage() {
            if (!currentChatUser) {
                alert('Выберите собеседника');
                return;
            }

            const input = document.getElementById('messageInput');
            const fileInput = document.getElementById('fileInput');
            const message = input.value.trim();
            const files = fileInput.files;
            const hasFiles = files && files.length > 0;

            if (!message && !hasFiles) return;

            const formData = new FormData();
            formData.append('to', currentChatUser);
            formData.append('message', message);

            if (hasFiles) {
                for (const file of files) {
                    formData.append('files', file);
                }
            }

            const response = await fetch('/api/send_message', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (!data.success) {
                alert(data.message || 'Ошибка отправки сообщения');
                return;
            }

            input.value = '';
            fileInput.value = '';
        }
        
        // Показать уведомление
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Реакции
        function sendReaction(messageId, emoji) {
            if (!socket) return;
            socket.emit('add_reaction', {message_id: messageId, emoji: emoji});
        }

        function updateReactionUI(data) {
            const messageDiv = document.querySelector(`[data-message-id="${data.message_id}"]`);
            if (!messageDiv) return;

            const reactionsMap = {};
            (data.reactions || []).forEach(r => {
                reactionsMap[r.emoji] = r.count;
            });
            const myReaction = data.my_reaction || null;

            REACTION_EMOJIS.forEach(e => {
                const btn = messageDiv.querySelector(`.reaction-btn[data-emoji="${e}"]`);
                if (!btn) return;
                const countEl = btn.querySelector('.count');
                if (countEl) countEl.textContent = (reactionsMap[e] || 0);

                if (myReaction === e) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // Настройки
        function getInitial(nickname) {
            if (!nickname) return '?';
            const s = String(nickname).trim();
            if (!s) return '?';
            return s[0].toUpperCase();
        }

        function setAvatarForCurrentUser(username, avatarUrl, nickname) {
            const wrap = document.getElementById('currentAvatarWrap');
            const img = document.getElementById('currentAvatar');
            const initials = document.getElementById('currentAvatarInitials');

            const initialText = getInitial(nickname || username);
            initials.textContent = initialText;

            if (avatarUrl) {
                img.classList.add('show');
                img.onerror = () => {
                    img.classList.remove('show');
                    img.src = '';
                    initials.style.display = 'block';
                };
                img.src = `${avatarUrl}?t=${Date.now()}`;
                initials.style.display = 'none';
            } else {
                img.classList.remove('show');
                img.src = '';
                initials.style.display = 'block';
            }
        }

        function openSettings() {
            document.getElementById('settingsNickname').value = currentUser?.nickname || '';
            document.getElementById('settingsCurrentPassword').value = '';
            document.getElementById('settingsNewPassword').value = '';
            document.getElementById('avatarInput').value = '';
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        async function saveNickname() {
            const nickname = document.getElementById('settingsNickname').value.trim();
            if (!nickname) return alert('Никнейм не может быть пустым');

            const response = await fetch('/api/update_nickname', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nickname})
            });
            const data = await response.json();
            if (!data.success) return alert(data.message || 'Ошибка');

            currentUser.nickname = nickname;
            document.getElementById('currentNickname').textContent = nickname;
            closeSettings();
            loadUsers();
        }

        async function changePassword() {
            const current_password = document.getElementById('settingsCurrentPassword').value;
            const new_password = document.getElementById('settingsNewPassword').value;

            const response = await fetch('/api/update_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({current_password, new_password})
            });
            const data = await response.json();
            if (!data.success) return alert(data.message || 'Ошибка');

            alert('Пароль изменен');
            closeSettings();
        }

        async function uploadAvatar() {
            const files = document.getElementById('avatarInput').files;
            if (!files || files.length === 0) return alert('Выберите файл аватара');

            const fd = new FormData();
            fd.append('avatar', files[0]);

            const response = await fetch('/api/update_avatar', {
                method: 'POST',
                body: fd
            });
            const data = await response.json();
            if (!data.success) return alert(data.message || 'Ошибка');
            setAvatarForCurrentUser(currentUser.username, `/api/avatar/${currentUser.username}`, currentUser.nickname);
            document.getElementById('avatarInput').value = '';
            closeSettings();
        }
        
        // Проверка авторизации при загрузке
        async function checkAuth() {
            const response = await fetch('/api/check_auth');
            const data = await response.json();
            
            if (data.authenticated) {
                currentUser = data;
                document.getElementById('currentNickname').textContent = data.nickname;
                document.getElementById('currentUsername').textContent = `@${data.username}`;
                setAvatarForCurrentUser(data.username, data.avatar_url, data.nickname);
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('fileInput').disabled = true;
                initSocket();
                loadUsers();
            }
        }
        
        // Запуск при загрузке
        checkAuth();
    </script>
</body>
</html>
