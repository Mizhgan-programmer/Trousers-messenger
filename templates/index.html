<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trousers Messenger</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: white; border-radius: 20px; padding: 40px; width: 350px; }
        .auth-box h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .auth-box button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; }
        .auth-tab.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .chat-container { display: none; height: 100vh; }
        .sidebar { width: 280px; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .user-info { padding: 20px; text-align: center; background: white; }
        .avatar-large { width: 70px; height: 70px; border-radius: 50%; background: #667eea; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; font-weight: bold; }
        .avatar-small { width: 36px; height: 36px; border-radius: 50%; background: #667eea; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: bold; }
        .logout-btn, .settings-btn { width: 100%; padding: 8px; margin-top: 8px; border: none; border-radius: 8px; cursor: pointer; }
        .logout-btn { background: #ff4757; color: white; }
        .settings-btn { background: #e9ecef; }
        .users-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 10px; margin: 5px 0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #e9ecef; }
        .user-item.active { background: #667eea; color: white; }
        .user-info-flex { display: flex; gap: 10px; align-items: center; }
        .online-status { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: #4cd137; }
        .offline { background: #a4b0be; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #ddd; }
        .messages-area { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; }
        .message { margin-bottom: 12px; display: flex; flex-direction: column; }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-bubble { max-width: 70%; padding: 8px 12px; border-radius: 14px; word-break: break-word; }
        .message.sent .message-bubble { background: #667eea; color: white; }
        .message.received .message-bubble { background: white; border: 1px solid #ddd; }
        .message-info { font-size: 10px; margin: 4px 8px; color: #888; display: flex; gap: 8px; }
        .message-input-area { padding: 12px; background: white; border-top: 1px solid #ddd; display: flex; gap: 8px; }
        .message-input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .message-input-area button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .file-picker { padding: 10px 15px; background: #e9ecef; border-radius: 10px; cursor: pointer; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; padding: 24px; width: 380px; }
        .modal-title { font-size: 20px; margin-bottom: 20px; }
        .modal-row { margin: 15px 0; }
        .modal-row input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        hr { margin: 20px 0; }
        .btn-primary { background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background: #e9ecef; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .flex { display: flex; }
        .attachment-img { max-width: 150px; border-radius: 8px; margin: 5px 0; cursor: pointer; }
        .error { color: red; font-size: 12px; text-align: center; margin-top: 10px; }
        
        /* Реакции */
        .reactions-wrapper { position: relative; margin-top: 4px; display: inline-block; }
        .reactions-toggle {
            background: rgba(0,0,0,0.06);
            border: none;
            border-radius: 16px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
        }
        .reactions-panel {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: white;
            border-radius: 24px;
            padding: 6px 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            display: none;
            gap: 5px;
            z-index: 100;
            margin-bottom: 6px;
            border: 1px solid #e0e0e0;
        }
        .reactions-panel.show { display: flex; }
        .reaction-emoji-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 20px;
        }
        .reaction-emoji-btn:hover { background: #f0f0f0; }
        .reaction-emoji-btn.active { background: rgba(102,126,234,0.2); }
        .reaction-count { font-size: 10px; margin-left: 2px; }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>👖 Trousers</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <button onclick="register()">Зарегистрироваться</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <div id="chatContainer" class="chat-container flex">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar-large" id="myAvatar">?</div>
                <h3 id="myNickname"></h3>
                <p id="myUsername" style="font-size:12px;color:#888;"></p>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                <button class="settings-btn" onclick="openSettings()">⚙️ Настройки</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <h2 id="chatHeader">Выберите собеседника</h2>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">📤</button>
                <input type="file" id="fileInput" multiple style="display:none;">
                <label class="file-picker" for="fileInput">📎</label>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-title">⚙️ Настройки</div>
            <div class="modal-row">
                <label>✏️ Никнейм</label>
                <input type="text" id="settingsNickname">
                <button class="btn-primary" onclick="saveNickname()" style="margin-top:10px;">Сохранить</button>
            </div>
            <hr>
            <div class="modal-row">
                <label>🔐 Смена пароля</label>
                <input type="password" id="settingsCurrentPassword" placeholder="Текущий">
                <input type="password" id="settingsNewPassword" placeholder="Новый" style="margin-top:10px;">
                <button class="btn-primary" onclick="changePassword()" style="margin-top:10px;">Сменить</button>
            </div>
            <hr>
            <div class="modal-row">
                <label>🖼️ Аватарка</label>
                <input type="file" id="avatarInput" accept="image/*">
                <button class="btn-primary" onclick="uploadAvatar()" style="margin-top:10px;">Загрузить</button>
            </div>
            <hr>
            <div style="text-align:center;">
                <button class="btn-secondary" onclick="closeSettings()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentChatUser = null;
        let sending = false;
        const REACTIONS = ['👍', '❤️', '😂', '😮', '🎉'];

        function $(id) { return document.getElementById(id); }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                $('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                $('registerForm').classList.add('active');
            }
        }

        async function register() {
            const username = $('regUsername').value.trim();
            const password = $('regPassword').value;
            const nickname = $('regNickname').value.trim();
            if (!username || !password || !nickname) {
                $('regError').textContent = 'Заполните все поля';
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    switchTab('login');
                } else {
                    $('regError').textContent = data.message;
                }
            } catch(e) { $('regError').textContent = 'Ошибка соединения'; }
        }

        async function login() {
            const username = $('loginUsername').value.trim();
            const password = $('loginPassword').value;
            if (!username || !password) {
                $('loginError').textContent = 'Заполните поля';
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    currentUser = data;
                    $('myNickname').textContent = data.nickname;
                    $('myUsername').textContent = `@${data.username}`;
                    $('myAvatar').textContent = data.nickname[0].toUpperCase();
                    $('authContainer').style.display = 'none';
                    $('chatContainer').style.display = 'flex';
                    initSocket();
                    loadUsers();
                } else {
                    $('loginError').textContent = data.message;
                }
            } catch(e) { $('loginError').textContent = 'Ошибка соединения'; }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            if (socket) socket.disconnect();
            location.reload();
        }

        function initSocket() {
            if (socket) socket.disconnect();
            socket = io({ transports: ['websocket'] });
            
            socket.on('connect', () => console.log('Socket connected'));
            socket.on('user_list_update', (users) => updateUsersList(users));
            socket.on('chat_history', (data) => {
                renderMessages(data.history);
                if (data.other_user !== currentChatUser) {
                    currentChatUser = data.other_user;
                    $('chatHeader').innerHTML = `💬 Чат с ${data.other_user}`;
                }
            });
            socket.on('new_message', (msg) => addMessage(msg));
            socket.on('reaction_update', (data) => updateReaction(data));
            socket.on('message_deleted', (data) => {
                const el = document.querySelector(`.message[data-id="${data.message_id}"]`);
                if (el) el.remove();
            });
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                updateUsersList(users);
            } catch(e) { console.error(e); }
        }

        function updateUsersList(users) {
            const list = $('usersList');
            list.innerHTML = users.filter(u => u.username !== currentUser.username).map(user => `
                <div class="user-item ${currentChatUser === user.username ? 'active' : ''}" onclick="startChat('${user.username}')">
                    <div class="user-info-flex">
                        <div class="avatar-small">${(user.nickname || user.username)[0].toUpperCase()}</div>
                        <div><strong>${escapeHtml(user.nickname)}</strong><br><small>@${user.username}</small></div>
                    </div>
                    <span class="online-status ${user.is_online ? 'online' : 'offline'}"></span>
                </div>
            `).join('');
        }

        function startChat(username) {
            if (currentChatUser === username) return;
            currentChatUser = username;
            $('chatHeader').innerHTML = `💬 Чат с ${username}`;
            $('messageInput').disabled = false;
            socket.emit('join_chat', { other_user: username });
        }

        function renderMessages(history) {
            const area = $('messagesArea');
            area.innerHTML = '';
            if (!history || history.length === 0) {
                area.innerHTML = '<div style="text-align:center;color:#888;margin-top:40px;">✨ Нет сообщений</div>';
                return;
            }
            history.forEach(msg => addMessage(msg));
            area.scrollTop = area.scrollHeight;
        }

        function addMessage(msg) {
            const isSent = msg.from === currentUser.username;
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.setAttribute('data-id', msg.id);
            
            // Собираем реакции
            const reactions = {};
            (msg.reactions || []).forEach(r => { reactions[r.emoji] = r.count; });
            let summary = '';
            for (const [e, c] of Object.entries(reactions)) summary += `${e}${c > 1 ? c : ''}`;
            if (!summary) summary = '😊';
            
            const attHtml = (msg.attachments || []).map(att => {
                if (att.mime_type && att.mime_type.startsWith('image/')) {
                    return `<img class="attachment-img" src="${att.url}" onclick="window.open('${att.url}')">`;
                }
                return `<a href="${att.url}" target="_blank">📄 ${escapeHtml(att.file_name)}</a>`;
            }).join('');
            
            div.innerHTML = `
                <div class="message-bubble">
                    ${attHtml ? attHtml + '<br>' : ''}
                    ${escapeHtml(msg.message)}
                </div>
                <div class="message-info">
                    <span>${msg.from_nickname} • ${msg.timestamp}</span>
                    <button onclick="deleteMessage(${msg.id})" style="background:none;border:none;color:#999;cursor:pointer;">🗑️</button>
                </div>
                <div class="reactions-wrapper">
                    <button class="reactions-toggle" onclick="togglePanel(event, this)">
                        <span>${summary}</span> <span style="font-size:9px;">▼</span>
                    </button>
                    <div class="reactions-panel" data-msg="${msg.id}">
                        ${REACTIONS.map(e => {
                            const active = msg.my_reaction === e;
                            const cnt = reactions[e] || '';
                            return `<button class="reaction-emoji-btn ${active ? 'active' : ''}" data-emoji="${e}" onclick="toggleReaction(${msg.id}, '${e}', event)">${e}${cnt ? `<span class="reaction-count">${cnt}</span>` : ''}</button>`;
                        }).join('')}
                    </div>
                </div>
            `;
            $('messagesArea').appendChild(div);
            $('messagesArea').scrollTop = $('messagesArea').scrollHeight;
        }

        function togglePanel(event, btn) {
            event.stopPropagation();
            const panel = btn.nextElementSibling;
            document.querySelectorAll('.reactions-panel').forEach(p => {
                if (p !== panel) p.classList.remove('show');
            });
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                const close = (e) => {
                    if (!btn.contains(e.target) && !panel.contains(e.target)) {
                        panel.classList.remove('show');
                        document.removeEventListener('click', close);
                    }
                };
                setTimeout(() => document.addEventListener('click', close), 10);
            }
        }

        function toggleReaction(msgId, emoji, event) {
            event.stopPropagation();
            if (!socket) return;
            const div = document.querySelector(`.message[data-id="${msgId}"]`);
            const btn = div.querySelector(`.reaction-emoji-btn[data-emoji="${emoji}"]`);
            const isActive = btn?.classList.contains('active');
            socket.emit(isActive ? 'remove_reaction' : 'add_reaction', { message_id: msgId, emoji: emoji });
            const panel = div.querySelector('.reactions-panel');
            if (panel) panel.classList.remove('show');
        }

        function updateReaction(data) {
            const div = document.querySelector(`.message[data-id="${data.message_id}"]`);
            if (!div) return;
            const reactions = {};
            data.reactions.forEach(r => { reactions[r.emoji] = r.count; });
            let summary = '';
            for (const [e, c] of Object.entries(reactions)) summary += `${e}${c > 1 ? c : ''}`;
            if (!summary) summary = '😊';
            const toggleSpan = div.querySelector('.reactions-toggle span:first-child');
            if (toggleSpan) toggleSpan.textContent = summary;
            
            REACTIONS.forEach(e => {
                const btn = div.querySelector(`.reaction-emoji-btn[data-emoji="${e}"]`);
                if (btn) {
                    const cnt = reactions[e] || '';
                    const cntSpan = btn.querySelector('.reaction-count');
                    if (cnt) {
                        if (!cntSpan) btn.innerHTML = `${e}<span class="reaction-count">${cnt}</span>`;
                        else cntSpan.textContent = cnt;
                    } else if (cntSpan) cntSpan.remove();
                    if (data.my_reaction === e) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        }

        async function sendMessage() {
            if (!currentChatUser || sending) return;
            const input = $('messageInput');
            const fileInput = $('fileInput');
            const message = input.value.trim();
            const files = fileInput.files;
            if (!message && (!files || files.length === 0)) return;
            
            sending = true;
            const formData = new FormData();
            formData.append('to', currentChatUser);
            formData.append('message', message);
            for (const f of files) formData.append('files', f);
            
            try {
                const res = await fetch('/api/send_message', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    fileInput.value = '';
                } else {
                    alert(data.message || 'Ошибка');
                }
            } catch(e) { alert('Ошибка отправки'); }
            finally { sending = false; }
        }

        async function deleteMessage(messageId) {
            if (!confirm('Удалить сообщение?')) return;
            await fetch('/api/delete_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message_id: messageId })
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openSettings() {
            $('settingsNickname').value = currentUser?.nickname || '';
            $('settingsCurrentPassword').value = '';
            $('settingsNewPassword').value = '';
            $('avatarInput').value = '';
            $('settingsModal').style.display = 'flex';
        }

        function closeSettings() { $('settingsModal').style.display = 'none'; }

        async function saveNickname() {
            const nickname = $('settingsNickname').value.trim();
            if (!nickname) return alert('Введите никнейм');
            const res = await fetch('/api/update_nickname', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname })
            });
            const data = await res.json();
            if (data.success) {
                currentUser.nickname = nickname;
                $('myNickname').textContent = nickname;
                $('myAvatar').textContent = nickname[0].toUpperCase();
                closeSettings();
                loadUsers();
            } else alert(data.message);
        }

        async function changePassword() {
            const current = $('settingsCurrentPassword').value;
            const newPass = $('settingsNewPassword').value;
            if (!current || !newPass) return alert('Заполните поля');
            const res = await fetch('/api/update_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: current, new_password: newPass })
            });
            const data = await res.json();
            if (data.success) {
                alert('Пароль изменён');
                closeSettings();
            } else alert(data.message);
        }

        async function uploadAvatar() {
            const file = $('avatarInput').files[0];
            if (!file) return alert('Выберите файл');
            const fd = new FormData();
            fd.append('avatar', file);
            const res = await fetch('/api/update_avatar', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) {
                alert('Аватар обновлён');
                closeSettings();
                // Обновляем отображение аватарки
                const avatarUrl = `/api/avatar/${currentUser.username}?t=${Date.now()}`;
                $('myAvatar').style.backgroundImage = `url(${avatarUrl})`;
                $('myAvatar').style.backgroundSize = 'cover';
                $('myAvatar').textContent = '';
            } else alert(data.message);
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/check_auth');
                const data = await res.json();
                if (data.authenticated) {
                    currentUser = data;
                    $('myNickname').textContent = data.nickname;
                    $('myUsername').textContent = `@${data.username}`;
                    $('myAvatar').textContent = data.nickname[0].toUpperCase();
                    $('authContainer').style.display = 'none';
                    $('chatContainer').style.display = 'flex';
                    initSocket();
                    loadUsers();
                }
            } catch(e) { console.error(e); }
        }
        
        checkAuth();
    </script>
</body>
</html>
